    /* ===== Custom Date Picker ===== */
    .dp-wrap { position: relative; }
    .dp-input-row { display: flex; align-items: center; }
    .dp-input {
        background: #f8fafc;
        border: 1px solid #dbeafe;
        border-radius: 0.75rem;
        padding: 0.625rem 2.5rem 0.625rem 1rem;
        width: 100%;
        font-family: var(--font-main);
        font-size: 0.875rem;

        cursor: pointer;
        transition: all 0.2s;
        outline: none;

    .dp-input:focus, .dp-input.open {

        box-shadow: 0 0 0 4px rgba(45,50,130,0.1);
    }
    .dp-input.error {
    border-color: #f87171;
    background: rgba(254,242,242,0.3);
    }
    .dp-input.dp-autocalc {
        background: #f1f5f9;
        border-color: #cbd5e1;
        color: #64748b;
        cursor: not-allowed;
        opacity: 1;
    }
    .dp-input.dp-autocalc:focus,
    .dp-input.dp-autocalc.open {
        background: #f1f5f9;
        border-color: #cbd5e1;
        box-shadow: none;
    }
    .dp-icon {
        position: absolute;
        right: 0.75rem;
        top: 50%;
        transform: translateY(-50%);
        color: #94a3b8;
        pointer-events: none;
        font-size: 18px;
    }
    .dp-popup {
        display: none;
        position: fixed;
        z-index: 99999;
        background: #fff;
        border: 1px solid #e2e8f0;
        border-radius: 1rem;
        box-shadow: 0 18px 40px rgba(15,23,42,0.14);
        width: 320px;
        max-width: calc(100vw - 32px);
        padding: 0.875rem;
        font-family: var(--font-main);
    }
    .dp-popup.open { display: block; }
    .dp-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 0.75rem;
    }
    .dp-nav-btn {
        width: 32px; height: 32px;
        border-radius: 0.5rem;
        border: 1px solid #e2e8f0;
        background: #f8fafc;
        display: flex; align-items: center; justify-content: center;
        cursor: pointer;
        color: #64748b;
        transition: all 0.15s;
        font-size: 18px;
    }
    .dp-nav-btn:hover { background: #2D3282; color: #fff; border-color: #2D3282; }
    .dp-month-year {
        font-size: 0.95rem;
        font-weight: 700;
        color: #1e293b;
        cursor: pointer;
        padding: 4px 10px;
        border-radius: 0.5rem;
        transition: background 0.15s;
    }
    .dp-month-year:hover { background: #f1f5f9; }
    .dp-weekdays {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        margin-bottom: 4px;
    }
    .dp-weekday {
        text-align: center;
        font-size: 0.7rem;
        font-weight: 700;
        color: #94a3b8;
        padding: 4px 0;
        text-transform: uppercase;
        letter-spacing: 0.05em;
    }
    .dp-days {
        display: grid;
        grid-template-columns: repeat(7, 30px);
        grid-auto-rows: 30px;
        justify-content: space-between;
        gap: 2px;
        min-height: 190px;
    }
    .dp-day {
        width: 30px;
        height: 30px;
        display: flex; align-items: center; justify-content: center;
        border-radius: 0.45rem;
        font-size: 0.78rem;
        cursor: pointer;
        color: #1e293b;
        transition: all 0.15s;
        font-weight: 400;
    }
    .dp-day:hover:not(.dp-day-disabled):not(.dp-day-selected) {
        background: #EEF2FF;
        color: #2D3282;
        font-weight: 600;
    }
    .dp-day-other { color: #cbd5e1; }
    .dp-day-today {
        font-weight: 700;
        color: #2D3282;
        border: 1.5px solid #2D3282;
    }
    .dp-day-selected {
        background: #2D3282 !important;
        color: #fff !important;
        font-weight: 700;
    }
    .dp-day-disabled {
