<div id="password-warning-modal" class="hidden fixed inset-0 z-[90] items-center justify-center bg-slate-900/35 px-5 py-8">
    <div class="w-full max-w-[460px] overflow-hidden rounded-[16px] border border-blue-100 bg-white shadow-2xl">
        <div class="flex items-center justify-between border-b border-blue-50 px-5 py-4">
            <div class="flex items-center gap-3">
                <div class="grid h-10 w-10 place-items-center rounded-[12px] bg-blue-50 text-primary">
                    <span class="material-symbols-outlined" style='font-variation-settings: "FILL" 1;'>lock_clock</span>
                </div>
                <h3 class="text-base font-bold text-slate-900">Password Expiring</h3>
            </div>
            <button type="button" onclick="closePasswordWarningModal()" class="text-slate-400 transition hover:text-slate-700" aria-label="Close password warning">
                <span class="material-symbols-outlined">close</span>
            </button>
        </div>
        <div class="space-y-5 p-5">
            <p id="password-warning-message" class="text-sm font-medium leading-7 text-slate-600"></p>
            <div class="grid grid-cols-1 gap-3 sm:grid-cols-2">
                <button type="button" onclick="closePasswordWarningModal()" class="h-11 rounded-[12px] border border-blue-100 bg-white text-sm font-bold text-slate-600 transition hover:bg-blue-50">
                    Later
                </button>
                <button type="button" onclick="goToChangePassword()" class="h-11 rounded-[12px] bg-primary text-sm font-bold text-white shadow-lg shadow-indigo-100 transition hover:bg-primary-muted">
                    Change Password
                </button>
            </div>
        </div>
    </div>
</div>

<script>
    function closePasswordWarningModal() {
        const modal = document.getElementById('password-warning-modal');
        if (!modal) return;
        modal.classList.add('hidden');
        modal.classList.remove('flex');
    }

    function goToChangePassword() {
        window.location.href = '/change-password';
    }

    function showPasswordWarningModal(days) {
        const modal = document.getElementById('password-warning-modal');
        const message = document.getElementById('password-warning-message');
        if (!modal || !message) return;
        message.textContent = `รหัสผ่านของคุณจะหมดอายุในอีก ${days} วัน กรุณาเปลี่ยนรหัสผ่านก่อนถึงกำหนด`;
        modal.classList.remove('hidden');
        modal.classList.add('flex');
    }

    (function () {
        const role = sessionStorage.getItem('role') || '';
        if (role === 'superadmin') {
            document.querySelectorAll('.superadmin-only').forEach(el => el.classList.remove('hidden'));
            document.querySelectorAll('.work-menu').forEach(el => el.classList.add('hidden'));
        }

        const warningDays = sessionStorage.getItem('password_warning_days');
        if (warningDays && !sessionStorage.getItem('password_warning_seen')) {
            sessionStorage.setItem('password_warning_seen', '1');
            setTimeout(() => showPasswordWarningModal(warningDays), 300);
        }
    })();
</script>
