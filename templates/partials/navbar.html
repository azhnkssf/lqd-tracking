<!-- Shared Thai Date Utilities -->
<script>
    window.LQDThaiDate = window.LQDThaiDate || (function () {
        const monthsFull = [
            'มกราคม', 'กุมภาพันธ์', 'มีนาคม', 'เมษายน', 'พฤษภาคม', 'มิถุนายน',
            'กรกฎาคม', 'สิงหาคม', 'กันยายน', 'ตุลาคม', 'พฤศจิกายน', 'ธันวาคม'
        ];

        const monthsShort = [
            'ม.ค.', 'ก.พ.', 'มี.ค.', 'เม.ย.', 'พ.ค.', 'มิ.ย.',
            'ก.ค.', 'ส.ค.', 'ก.ย.', 'ต.ค.', 'พ.ย.', 'ธ.ค.'
        ];

        function shortMonth(index) {
            return monthsShort[Number(index)] || '';
        }

        function fullMonth(index) {
            return monthsFull[Number(index)] || '';
        }

        return { monthsFull, monthsShort, shortMonth, fullMonth };
    })();
</script>
