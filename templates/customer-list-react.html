<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Customer List | LQD Tracking Management System</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@200;300;400;500;600;700;800;900&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface": "#F0F7FF",
              "primary": "#2D3282",
              "primary-muted": "#3F45B5",
              "accent-coral": "#FF5F5F",
              "on-surface": "#1E293B"
            },
            fontFamily: {
              "headline": ["Kanit", "sans-serif"],
              "body": ["Kanit", "sans-serif"]
            }
          }
        }
      }
    </script>
    <style type="text/tailwindcss">
      * { font-family: "Kanit", sans-serif; }
      body { @apply bg-surface text-on-surface font-body; }
      .material-symbols-outlined { font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24; }
      .page-card { @apply bg-white rounded-[26px] border border-blue-100/80 shadow-xl shadow-indigo-100/40 overflow-hidden; }
      .btn-primary-modern { @apply inline-flex items-center justify-center gap-1.5 px-4 py-2.5 bg-primary text-white rounded-xl text-xs font-bold shadow-md shadow-indigo-100 hover:bg-primary-muted transition-all whitespace-nowrap disabled:opacity-60 disabled:cursor-not-allowed; }
      .btn-secondary-modern { @apply inline-flex items-center justify-center gap-1.5 px-4 py-2.5 bg-white text-indigo-600 border border-blue-200 rounded-xl text-xs font-bold hover:bg-blue-50 transition-all shadow-sm whitespace-nowrap disabled:opacity-60 disabled:cursor-not-allowed; }
      .input-modern { @apply w-full pl-11 pr-3 py-2.5 bg-white border border-blue-100 rounded-xl focus:ring-4 focus:ring-primary/10 focus:border-primary transition-all text-sm font-semibold text-slate-600 shadow-sm outline-none; }
      .modal-shell { @apply relative flex w-full max-w-2xl max-h-[calc(100vh-2rem)] flex-col overflow-hidden rounded-[24px] border border-blue-100 bg-white shadow-2xl shadow-slate-900/20; }
      .modal-header { @apply flex-shrink-0 px-5 md:px-6 py-4 border-b border-blue-100 bg-gradient-to-r from-blue-50 via-white to-indigo-50; }
      .modal-icon { @apply w-10 h-10 rounded-2xl bg-white border border-blue-100 text-primary flex items-center justify-center shadow-sm flex-shrink-0; }
      .modal-close { @apply w-9 h-9 rounded-xl border border-blue-100 bg-white text-slate-400 hover:text-primary hover:bg-blue-50 hover:border-blue-200 transition-all flex items-center justify-center flex-shrink-0; }
      .modal-body { @apply min-h-0 px-5 md:px-6 py-5 bg-white overflow-y-auto; }
      .modal-footer { @apply flex-shrink-0 px-5 md:px-6 py-4 border-t border-blue-100 bg-slate-50/70 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3; }
      .modal-section-title { @apply text-[11px] font-bold text-slate-400 uppercase tracking-widest; }
      .add-error-banner { @apply flex-shrink-0 mx-5 md:mx-6 mt-5 rounded-2xl border border-red-200 bg-red-50 px-4 py-3 flex items-start gap-3; }
      .add-field { @apply h-full rounded-2xl border border-blue-100 bg-white p-4 shadow-sm flex flex-col; }
      .add-label { @apply mb-2 block text-[12px] font-bold text-slate-600; }
      .add-input { @apply w-full rounded-xl border border-blue-100 bg-slate-50 pl-11 pr-4 py-2.5 text-sm font-semibold text-slate-700 outline-none transition-all focus:bg-white focus:border-primary focus:ring-4 focus:ring-primary/10; }
      .add-input::placeholder { color: #94a3b8; opacity: 1; }
      .add-note-input { padding-left: 1rem; }
      .add-helper { @apply mt-2 min-h-8 text-[11px] font-medium text-slate-400 leading-relaxed; }
      .review-panel { @apply rounded-2xl border border-blue-100 bg-white shadow-sm overflow-hidden; }
      .review-account { @apply flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3 border-b border-blue-100 bg-slate-50/80 px-4 py-4; }
      .review-item { @apply px-4 py-3; }
      .review-label { @apply text-[11px] font-bold text-slate-400 uppercase tracking-wider; }
      .review-value { @apply mt-1 text-[15px] font-bold text-slate-800 leading-6; }
      .per-page-trigger { @apply h-11 min-w-[132px] inline-flex items-center justify-between gap-3 rounded-2xl border border-blue-100 bg-white px-4 text-sm font-bold text-slate-700 shadow-sm transition-all hover:border-blue-200 hover:bg-blue-50/40 focus:outline-none focus:ring-4 focus:ring-primary/10; }
      .case-tab { @apply px-3 py-1.5 rounded-xl text-[11px] font-bold transition-all shadow-sm border; }
      .active-tab { @apply bg-primary text-white border-primary; }
      .inactive-tab { @apply bg-white text-slate-500 border-slate-200 hover:border-blue-300 hover:text-primary; }
      .table-shell { @apply overflow-x-hidden bg-white; }
      .mock-table { min-width: 0; width: 100%; table-layout: fixed; }
      .customer-list-page .mock-table { border-collapse: separate; border-spacing: 0; }
      .mock-table thead tr { @apply bg-slate-50/90 border-b border-blue-100 uppercase tracking-widest text-indigo-400 font-bold text-[11px]; }
      .mock-table thead th { @apply border-b border-blue-100; }
      .mock-table tbody { transition: opacity 160ms ease; }
      .mock-table tbody.is-loading { opacity: 0.62; }
      .mock-table tbody tr.main-row td { @apply border-b border-blue-50 transition-colors; }
      .mock-table tbody tr.main-row:hover td { @apply bg-blue-50/40; }
      .mock-table th, .mock-table td { @apply whitespace-nowrap align-middle; }
      .customer-list-page .mock-table th { padding: 0.85rem 0.6rem !important; }
      .customer-list-page .mock-table td { padding: 0.7rem 0.6rem !important; min-width: 0; overflow: hidden; }
      .account-pill { @apply inline-flex items-center justify-center gap-1.5 rounded-xl bg-indigo-50 text-primary text-xs font-bold border border-indigo-100 min-w-[104px] px-2 py-1.5 transition-all hover:bg-indigo-100 hover:border-indigo-200 focus:outline-none focus:ring-4 focus:ring-primary/10; font-size: 11.5px; }
      .copy-account-btn { @apply inline-flex items-center justify-center text-indigo-300 hover:text-primary transition-colors focus:outline-none; }
      .copy-toast { @apply fixed bottom-6 right-6 z-[120] hidden rounded-2xl border border-emerald-100 bg-white px-4 py-3 text-xs font-bold text-emerald-700 shadow-xl shadow-slate-900/10; }
      .copy-toast.show { @apply flex items-center gap-2; }
      .status-badge { @apply inline-flex items-center justify-center gap-1.5 px-2.5 py-1 rounded-full text-[11px] font-semibold border shadow-sm max-w-full overflow-hidden text-ellipsis whitespace-nowrap; }
      .action-icon-btn { @apply w-7 h-7 rounded-[0.7rem] border border-blue-100 bg-white text-indigo-400 hover:text-primary hover:bg-blue-50 hover:border-blue-200 transition-all inline-flex items-center justify-center; }
      .kpi-panel { @apply relative overflow-hidden rounded-[24px] border border-blue-100/80 bg-white p-1 shadow-xl shadow-indigo-100/30; font-family: "Kanit", sans-serif; }
      .kpi-panel::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(120deg, rgba(45, 50, 130, 0.08), transparent 28%, rgba(72, 187, 120, 0.05) 70%, transparent);
        pointer-events: none;
      }
      .kpi-grid { @apply relative z-10 grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-6 divide-y sm:divide-y-0 sm:divide-x divide-blue-50 overflow-hidden rounded-[20px]; }
      .kpi-item { @apply relative overflow-hidden px-4 py-2.5 xl:px-5 xl:py-3 transition-all duration-500 hover:bg-blue-50/35; }
      .kpi-item::before {
        content: "";
        position: absolute;
        inset: -20% -10%;
        opacity: 0;
        background: radial-gradient(circle at 50% 120%, var(--kpi-glow, rgba(45, 50, 130, 0.10)) 0%, transparent 68%);
        transition: opacity 0.5s ease;
      }
      .kpi-item:hover::before { opacity: 1; }
      .kpi-item:nth-child(1) { --kpi-glow: rgba(45, 50, 130, 0.12); }
      .kpi-item:nth-child(2) { --kpi-glow: rgba(63, 69, 181, 0.12); }
      .kpi-item:nth-child(3) { --kpi-glow: rgba(16, 185, 129, 0.10); }
      .kpi-item:nth-child(4) { --kpi-glow: rgba(245, 158, 11, 0.10); }
      .kpi-item:nth-child(5) { --kpi-glow: rgba(255, 95, 95, 0.12); }
      .kpi-item:nth-child(6) { --kpi-glow: rgba(100, 116, 139, 0.10); }
      .kpi-item > :not(.kpi-line) { @apply relative z-10; }
      .kpi-icon { @apply flex h-8 w-8 items-center justify-center rounded-xl border bg-white shadow-sm transition-all duration-500; }
      .kpi-item:hover .kpi-icon { @apply scale-105 rotate-3 shadow-md; }
      .kpi-percent { @apply inline-flex min-w-[44px] items-center justify-center rounded-full bg-blue-50 px-2.5 py-1 text-[11px] font-extrabold tracking-normal leading-none transition-colors; }
      .kpi-item:hover .kpi-percent { @apply bg-white; }
      .kpi-track { @apply hidden; }
      .kpi-fill { @apply h-full rounded-full transition-all duration-700; }
      .kpi-label { @apply mb-1 truncate text-[11px] font-semibold leading-snug tracking-normal text-slate-600; }
      .kpi-value { @apply text-[24px] xl:text-[27px] font-extrabold tracking-normal leading-tight text-slate-800 transition-all duration-500; }
      .kpi-item:hover .kpi-value { @apply translate-x-0.5 text-primary; }
      .kpi-unit { @apply text-[9.5px] font-semibold uppercase tracking-normal text-slate-500; }
      .kpi-sub { @apply text-[8.5px] font-extrabold uppercase tracking-normal text-current; }
      .kpi-footer-line { @apply relative h-0.5 flex-1 overflow-hidden rounded-full bg-blue-50; }
      .kpi-footer-line::after {
        content: "";
        position: absolute;
        left: 0;
        top: 0;
        height: 100%;
        width: 0;
        background: currentColor;
        transition: width 0.55s ease;
      }
      .kpi-item:hover .kpi-footer-line::after { width: 100%; }
      .kpi-line { @apply hidden; }
      .filter-section { @apply border-b border-slate-100 pb-5 last:border-b-0 last:pb-0; }
      .filter-title { @apply text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-3; }
      .filter-check-grid { @apply grid grid-cols-1 gap-2; }
      .filter-check-row { @apply flex items-center justify-between gap-3 rounded-xl border border-slate-100 bg-white px-3.5 py-3 text-sm font-medium text-slate-600 transition-all cursor-pointer hover:border-blue-200 hover:bg-blue-50/40; }
      .filter-check-row.active { @apply border-blue-200 bg-blue-50/70 text-slate-800; }
      .filter-check-input { @apply rounded border-slate-300 text-primary focus:ring-primary/20; }
      .filter-input { @apply w-full rounded-xl border-blue-100 bg-white text-xs font-medium text-slate-600 focus:ring-primary/10 focus:border-primary; }
      .drawer-backdrop { @apply fixed inset-0 z-[110] bg-slate-900/20 backdrop-blur-[2px] opacity-0 transition-opacity duration-200 ease-out; }
      .drawer-backdrop.open { @apply opacity-100; }
      .drawer-panel { @apply fixed right-0 top-0 bottom-0 z-[120] w-full max-w-md bg-white border-l border-blue-100 shadow-2xl shadow-slate-900/10 translate-x-full transition-transform duration-300 ease-out will-change-transform; }
      .drawer-panel.open { @apply translate-x-0; }
      .modal-backdrop { @apply opacity-0 transition-opacity duration-200 ease-out; }
      .modal-backdrop.open { @apply opacity-100; }
      .modal-content { opacity: 0; transform: translateY(10px) scale(0.985); transition: opacity 220ms ease-out, transform 220ms cubic-bezier(.2,.8,.2,1); will-change: opacity, transform; }
      .modal-content.open { opacity: 1; transform: translateY(0) scale(1); }
      .expanded-row td { @apply bg-slate-50/80 border-b border-blue-50; }
      .quick-view { @apply rounded-2xl border border-blue-100 bg-white/85 shadow-sm overflow-hidden; }
      .quick-section { @apply p-4; }
      .quick-section-header { @apply flex items-center gap-2 pb-2.5 mb-3.5 border-b border-slate-200; }
      .quick-section-title { @apply text-sm font-bold text-slate-800; }
      .quick-grid { @apply grid grid-cols-2 md:grid-cols-3 gap-x-5 gap-y-3; }
      .quick-kv { @apply min-w-0; }
      .quick-kv-label { @apply text-[11px] text-slate-500 font-semibold tracking-normal leading-4; }
      .quick-kv-value { @apply text-[12.5px] font-normal text-slate-600 mt-1 leading-5 truncate; }
      .admin-only { display: none; }
      .checker-admin-only { display: none; }
    </style>
    {% if not vite_dev_server_url %}
      {% for css_file in vite_css('src/main.tsx') %}
      <link rel="stylesheet" href="{{ url_for('static', filename=css_file) }}" />
      {% endfor %}
    {% endif %}
  </head>
  <body>
    <div id="root" data-page="customer-list"></div>
    {% if vite_dev_server_url %}
    <script type="module" src="{{ vite_dev_server_url }}/@vite/client"></script>
    <script type="module" src="{{ vite_dev_server_url }}/src/main.tsx"></script>
    {% else %}
    <script type="module" src="{{ url_for('static', filename=vite_asset('src/main.tsx')) }}"></script>
    {% endif %}
  </body>
</html>
