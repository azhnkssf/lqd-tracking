<!DOCTYPE html>
<html class="light" lang="th">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Change Password | LQD Tracking</title>
<script src="https://cdn.tailwindcss.com?plugins=forms"></script>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700;800&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script>
    tailwind.config = {
        theme: {
            extend: {
                colors: {
                    surface: "#F0F7FF",
                    primary: "#2D3282",
                    "primary-muted": "#3F45B5",
                    "accent-coral": "#FF5F5F",
                    "on-surface": "#1E293B"
                },
                fontFamily: { headline: ["Kanit", "sans-serif"], body: ["Kanit", "sans-serif"] }
            }
        }
    }
</script>
<style>
    * { font-family: "Kanit", sans-serif; }
    body { background: #F0F7FF; color: #1E293B; }
    .material-symbols-outlined { font-variation-settings: "FILL" 0, "wght" 420, "GRAD" 0, "opsz" 24; }
    .saving-spinner {
        width: 34px;
        height: 34px;
        border: 3px solid #DBEAFE;
        border-top-color: #2D3282;
        border-radius: 999px;
        animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<main class="min-h-screen flex items-center justify-center px-5 py-8">
    <section class="w-full max-w-[520px] bg-white border border-blue-100 rounded-[18px] shadow-xl shadow-indigo-100/60 overflow-hidden">
        <div class="px-7 py-6 border-b border-blue-50 flex items-center gap-4">
            <div class="w-11 h-11 rounded-[12px] bg-primary text-white grid place-items-center shadow-lg shadow-indigo-200">
                <span class="material-symbols-outlined" style='font-variation-settings: "FILL" 1;'>lock_reset</span>
            </div>
            <div class="min-w-0">
                <h1 class="text-xl font-bold text-slate-900 leading-tight">Change Password</h1>
                <p class="text-sm text-slate-500 mt-1">ตั้งรหัสผ่านใหม่ตามมาตรฐานความปลอดภัย</p>
            </div>
        </div>

        <form id="change-form" class="p-7 space-y-5" onsubmit="submitChange(event)">
            <div id="message" class="hidden rounded-[12px] border px-4 py-3 text-sm font-semibold"></div>

            <label class="block">
                <span class="text-sm font-bold text-slate-700">Current Password</span>
                <input id="current_password" type="password" autocomplete="current-password" class="mt-2 w-full rounded-[12px] border-blue-100 bg-slate-50 px-4 py-3 text-sm font-semibold focus:border-primary focus:ring-primary" required>
            </label>

            <label class="block">
                <span class="text-sm font-bold text-slate-700">New Password</span>
                <input id="new_password" type="password" autocomplete="new-password" class="mt-2 w-full rounded-[12px] border-blue-100 bg-slate-50 px-4 py-3 text-sm font-semibold focus:border-primary focus:ring-primary" required>
            </label>

            <label class="block">
                <span class="text-sm font-bold text-slate-700">Confirm New Password</span>
                <input id="confirm_password" type="password" autocomplete="new-password" class="mt-2 w-full rounded-[12px] border-blue-100 bg-slate-50 px-4 py-3 text-sm font-semibold focus:border-primary focus:ring-primary" required>
            </label>

            <div class="rounded-[12px] bg-blue-50 border border-blue-100 px-4 py-3 text-xs leading-6 text-slate-600">
                รหัสผ่านต้องเป็นไปตาม Password Policy ปัจจุบัน เช่น ความยาวขั้นต่ำ กลุ่มตัวอักษร ห้ามมีข้อมูลระบุตัวตน และห้ามรูปแบบเดาง่าย
            </div>

            <button id="submit-btn" type="submit" class="w-full h-12 rounded-[12px] bg-primary text-white text-sm font-bold shadow-lg shadow-indigo-100 hover:bg-primary-muted transition">
                Save Password
            </button>
        </form>
    </section>
</main>

<div id="saving-modal" class="hidden fixed inset-0 z-[90] items-center justify-center bg-slate-900/35 px-5 py-8">
    <div class="w-full max-w-[390px] rounded-[16px] border border-blue-100 bg-white p-6 text-center shadow-2xl">
        <div id="saving-icon-wrap" class="mx-auto grid h-16 w-16 place-items-center rounded-[16px] bg-blue-50 text-primary">
            <div class="saving-spinner"></div>
        </div>
        <h2 id="saving-title" class="mt-5 text-lg font-bold text-slate-900">Saving Password</h2>
        <p id="saving-message" class="mt-2 text-sm leading-6 text-slate-500">ระบบกำลังบันทึกรหัสผ่านใหม่ กรุณารอสักครู่</p>
    </div>
</div>

<script>
    let isSubmitting = false;

    function showMessage(text, ok = false) {
        const box = document.getElementById('message');
        box.textContent = text;
        box.className = `rounded-[12px] border px-4 py-3 text-sm font-semibold ${ok ? 'border-green-200 bg-green-50 text-green-700' : 'border-red-200 bg-red-50 text-red-700'}`;
    }

    function setSaving(isSaving, state = 'saving') {
        const modal = document.getElementById('saving-modal');
        const iconWrap = document.getElementById('saving-icon-wrap');
        const title = document.getElementById('saving-title');
        const message = document.getElementById('saving-message');
        const btn = document.getElementById('submit-btn');
        const form = document.getElementById('change-form');
        isSubmitting = isSaving;
        btn.disabled = isSaving;
        btn.textContent = state === 'redirecting' ? 'Redirecting...' : (isSaving ? 'Saving...' : 'Save Password');
        form.querySelectorAll('input').forEach(input => { input.disabled = isSaving; });

        if (state === 'redirecting') {
            iconWrap.innerHTML = '<span class="material-symbols-outlined text-[34px]" style="font-variation-settings: &quot;FILL&quot; 1;">check_circle</span>';
            iconWrap.classList.remove('bg-blue-50', 'text-primary');
            iconWrap.classList.add('bg-green-50', 'text-green-600');
            title.textContent = 'Password Changed';
            message.textContent = 'เปลี่ยนรหัสผ่านสำเร็จ ระบบกำลังพาคุณไปหน้าถัดไป';
        } else {
            iconWrap.innerHTML = '<div class="saving-spinner"></div>';
            iconWrap.classList.remove('bg-green-50', 'text-green-600');
            iconWrap.classList.add('bg-blue-50', 'text-primary');
            title.textContent = 'Saving Password';
            message.textContent = 'ระบบกำลังบันทึกรหัสผ่านใหม่ กรุณารอสักครู่';
        }

        modal.classList.toggle('hidden', !isSaving);
        modal.classList.toggle('flex', isSaving);
    }

    async function submitChange(event) {
        event.preventDefault();
        if (isSubmitting) return;
        setSaving(true);

        try {
            const response = await fetch('/api/auth/change-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    current_password: document.getElementById('current_password').value,
                    new_password: document.getElementById('new_password').value,
                    confirm_password: document.getElementById('confirm_password').value
                })
            });
            const data = await response.json();
            if (!response.ok) {
                showMessage(data.error || 'ไม่สามารถเปลี่ยนรหัสผ่านได้');
                return;
            }
            sessionStorage.removeItem('password_warning_days');
            sessionStorage.removeItem('password_warning_seen');
            showMessage('เปลี่ยนรหัสผ่านสำเร็จ', true);
            setSaving(true, 'redirecting');
            setTimeout(() => { window.location.href = data.redirect_to || '/customer-list'; }, 700);
            return;
        } catch (err) {
            showMessage('ไม่สามารถเชื่อมต่อ Server ได้ กรุณาลองใหม่อีกครั้ง');
        }

        setSaving(false);
    }
</script>
</body>
</html>
